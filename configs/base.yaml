# PII NER Project Configuration

project:
  name: pii_ner_system
  version: "1.0.0"
  description: "Production NER system for PII detection in Russian text"

# Random seed for reproducibility
random_seed: 42

# Paths configuration
paths:
  root: .
  data_dir: data
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  answer_dir: data/answer
  models_dir: models
  logs_dir: logs
  train_data: data/raw/train_dataset.tsv
  test_data: data/raw/private_test_dataset.csv
  config_file: configs/base.yaml

# Entity labels and categories
labels:
  PASSPORT:
    description: "Russian passport number (format: XX XX XXXXXX)"
    examples:
      - "12 34 567890"
      - "1234567890"
  SNILS:
    description: "Social insurance account number (format: XXX-XXX-XXX XX)"
    examples:
      - "123-456-789 01"
  INN:
    description: "Russian tax identification number (10 or 12 digits)"
    examples:
      - "7123456789"
      - "712345678901"
  PHONE:
    description: "Telephone number in various formats"
    examples:
      - "+7-999-123-45-67"
      - "+79991234567"
      - "8-999-123-45-67"
  EMAIL:
    description: "Email address"
    examples:
      - "user@example.com"
      - "john.doe@company.ru"
  CARD:
    description: "Bank card number (16-19 digits)"
    examples:
      - "5555444433332222"
      - "4111111111111111"
  ACCOUNT:
    description: "Bank account number"
    examples:
      - "40817810123456789012"
  ADDRESS:
    description: "Physical address"
    examples:
      - "Москва, ул. Ленина, д. 10, кв. 5"
  API_KEY:
    description: "API key or secret token"
    examples:
      - "sk_live_51234567890abcdef"
  PERSON_NAME:
    description: "Person's full name"
    examples:
      - "Иван Петров"
      - "Мария Сидорова"

# Regex detector configuration
regex:
  enabled: true
  priority: high
  patterns:
    passport:
      enabled: true
      timeout_ms: 50
    snils:
      enabled: true
      timeout_ms: 50
    inn:
      enabled: true
      timeout_ms: 50
    phone:
      enabled: true
      timeout_ms: 50
    email:
      enabled: true
      timeout_ms: 50
    card:
      enabled: true
      timeout_ms: 50
    account:
      enabled: true
      timeout_ms: 50
    address:
      enabled: false  # Requires NER
      timeout_ms: 100
    api_key:
      enabled: true
      timeout_ms: 50
  # Confidence threshold for regex matches
  min_confidence: 0.8
  # Maximum text length for regex processing
  max_text_length: 10000

# NER model configuration
ner:
  model_name: DeepPavlov/rubert-base-cased
  model_type: bert
  # Number of entity labels + BIO tags
  num_labels: 31  # (10 categories * 3 BIO) + 1 (O-tag)
  # Tokenizer configuration
  tokenizer:
    max_length: 512
    truncation: true
    padding: max_length
    return_offsets_mapping: true
  # Model inference settings
  inference:
    device: cuda
    batch_size: 64
    max_text_length: 10000
    # Confidence threshold for NER predictions
    confidence_threshold: 0.5
    # Strategy for overlapping token predictions
    overlap_strategy: greedy
  # Post-processing
  postprocessing:
    merge_subword_tokens: true
    min_entity_length: 1
    remove_partial_entities: false

# Training configuration
training:
  epochs: 10
  batch_size: 32
  eval_batch_size: 64
  learning_rate: 2.0e-5
  warmup_steps: 500
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  weight_decay: 0.01
  
  # Optimization
  optimizer: adam
  scheduler: linear
  
  # Device
  device: cuda
  
  # Checkpointing
  save_strategy: steps
  save_steps: 500
  save_total_limit: 3
  
  # Evaluation
  eval_strategy: steps
  eval_steps: 500
  
  # Random seed
  seed: 42
  
  # Data loading
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 3
    metric: f1
    
  # Logging
  logging_steps: 100
  log_level: info

# Merge layer configuration
merge:
  strategy: regex_priority  # regex_priority | ner_priority | confidence_weighted
  # When regex_priority: regex detections always take precedence
  allow_overlaps: false
  # Remove near-duplicates (same category, overlapping positions)
  deduplicate: true
  # Confidence weighting (if applicable)
  regex_confidence: 0.95
  ner_confidence_threshold: 0.5
  
# Inference configuration
inference:
  device: cuda
  batch_size: 64
  # Maximum text length per sample
  max_text_length: 10000
  # Timeout for inference (seconds)
  timeout: 60
  # Cache model and tokenizer
  cache_model: true
  # Number of workers for data loading
  num_workers: 4

# Metrics configuration
metrics:
  # Evaluation metric: strict_span_f1 (character-level, exact match)
  primary_metric: strict_span_f1
  # Micro-averaged F1
  average_method: micro
  # Include category matching
  strict_category_match: true
  # Report per-category metrics
  per_category_metrics: true
  # Save detailed results
  save_detailed_results: true

# Data configuration
data:
  # Train/test/val split
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  
  # Sampling strategy
  sampling_strategy: stratified  # stratified | random | sequential
  
  # Data augmentation
  augmentation:
    enabled: false
    num_augmentations: 3
    strategies:
      - synonym_replacement
      - random_insertion
      - random_swap

# Logging configuration
logging:
  level: INFO
  format: json  # json | text
  file: logs/pii_ner.log
  console: true
  max_size_mb: 100
  backup_count: 5

# System configuration
system:
  # For x10 load support
  cache_size_gb: 4
  query_timeout_seconds: 30
  max_queue_size: 1000
  num_worker_threads: 4
  
# Development & Debugging
debug:
  enabled: false
  verbose: false
  # Save intermediate predictions for debugging
  save_intermediate: false
  # Validate all predictions
  validate_predictions: true
